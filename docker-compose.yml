version: '3.8'

services:
  ff6-ai-player:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ff6_ai_player
    
    # Port mappings
    ports:
      - "5000:5000"  # Web interface
      - "5900:5900"  # VNC server (optional)
      - "9999:9999"  # Emulator socket
    
    # Volume mappings for persistence
    volumes:
      # Game ROM and emulator files
      - ./Bizhawk:/app/Bizhawk:ro
      # Screenshots and logs
      - ./screenshots:/app/screenshots
      - ./logs:/app/logs
      # Learning data persistence
      - ./learning_data:/app/learning_data
      - ./save_states:/app/save_states
      # Configuration
      - ./config.py:/app/config.py:ro
    
    # Environment variables
    environment:
      - DISPLAY=:99
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    
    # Restart policy
    restart: unless-stopped
    
    # Network configuration
    networks:
      - ff6_network
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: ff6_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - ff6-ai-player
    networks:
      - ff6_network
    restart: unless-stopped
    profiles:
      - production

networks:
  ff6_network:
    driver: bridge

volumes:
  learning_data:
  save_states:
  screenshots:
  logs:
