<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimson Eclipse</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #ff4444;
        }
        
        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        #gameCanvas {
            border: 2px solid #ff4444;
            background: #0d0d1a;
            cursor: none;
        }
        
        #gameUI {
            margin-top: 10px;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .ui-element {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            padding: 5px 10px;
            border-radius: 3px;
        }
        
        #healthBar, #xpBar {
            width: 200px;
            height: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #ff4444;
            position: relative;
            overflow: hidden;
        }
        
        #healthFill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff4444);
            transition: width 0.3s ease;
        }
        
        #xpFill {
            height: 100%;
            background: linear-gradient(90deg, #4444ff, #6666ff);
            transition: width 0.3s ease;
        }
        
        .bar-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }
        
        #startMenu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
            background: rgba(13, 13, 26, 0.9);
            border: 2px solid #ff4444;
            border-radius: 10px;
            padding: 30px;
            min-width: 400px;
        }
        
        #startMenu h1 {
            font-size: 48px;
            margin-bottom: 20px;
            margin-top: 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        
        #startMenu p {
            margin: 15px 0;
        }
        
        #startMenu button {
            background: rgba(255, 68, 68, 0.2);
            border: 2px solid #ff4444;
            color: #ff4444;
            padding: 15px 30px;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            margin: 15px 5px;
            transition: all 0.3s ease;
            display: block;
            width: 200px;
            margin-left: auto;
            margin-right: auto;
        }
        
        #startMenu button:hover {
            background: rgba(255, 68, 68, 0.4);
            transform: scale(1.05);
        }
        
        .hidden {
            display: none;
        }
        
        #upgradeMenu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(13, 13, 26, 0.95);
            border: 3px solid #ff4444;
            padding: 30px;
            text-align: center;
            z-index: 200;
            border-radius: 10px;
            max-width: 600px;
        }
        
        #upgradeMenu h2 {
            margin-top: 0;
            color: #ff4444;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        
        .upgrade-option {
            background: rgba(255, 68, 68, 0.1);
            border: 2px solid #ff4444;
            color: #ff4444;
            padding: 15px;
            margin: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 5px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .upgrade-option:hover {
            background: rgba(255, 68, 68, 0.3);
            transform: scale(1.05);
        }
        
        .upgrade-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .upgrade-description {
            font-size: 14px;
            opacity: 0.8;
        }
        
        .pause-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 300;
        }
        
        .pause-content {
            background: rgba(13, 13, 26, 0.95);
            border: 3px solid #ff4444;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            min-width: 300px;
        }
        
        .pause-content h2 {
            color: #ff4444;
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            font-size: 32px;
        }
        
        .pause-content p {
            color: #ff4444;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        
        .pause-content button {
            background: rgba(255, 68, 68, 0.2);
            border: 2px solid #ff4444;
            color: #ff4444;
            padding: 12px 24px;
            font-size: 16px;
            font-family: inherit;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            border-radius: 5px;
        }
        
        .pause-content button:hover {
            background: rgba(255, 68, 68, 0.4);
            transform: scale(1.05);
        }
        
        .stage-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 400;
        }
        
        .stage-content {
            background: rgba(13, 13, 26, 0.95);
            border: 3px solid #ff4444;
            border-radius: 10px;
            padding: 50px;
            text-align: center;
            min-width: 400px;
            max-width: 600px;
        }
        
        .stage-content h2 {
            color: #ff4444;
            margin-top: 0;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            font-size: 36px;
        }
        
        .stage-content h3 {
            color: #ff6666;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .stage-content p {
            color: #ff4444;
            margin-bottom: 30px;
            opacity: 0.8;
            font-style: italic;
        }
        
        .stage-objective {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            border-radius: 5px;
            padding: 15px;
            margin: 20px 0;
            color: #ffaaaa;
            font-weight: bold;
        }
        
        .stage-rewards {
            background: rgba(68, 255, 68, 0.1);
            border: 1px solid #44ff44;
            border-radius: 5px;
            padding: 15px;
            margin: 20px 0;
        }
        
        .stage-rewards p {
            color: #44ff44;
            margin: 5px 0;
            opacity: 1;
            font-style: normal;
        }
        
        .stage-content button {
            background: rgba(255, 68, 68, 0.2);
            border: 2px solid #ff4444;
            color: #ff4444;
            padding: 15px 30px;
            font-size: 18px;
            font-family: inherit;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            border-radius: 5px;
        }
        
        .stage-content button:hover {
            background: rgba(255, 68, 68, 0.4);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="startMenu">
            <h1>CRIMSON ECLIPSE</h1>
            <p>Survive the endless night...</p>
            <button onclick="startGame()">START GAME</button>
            <button onclick="showMetaProgression()">SOUL SANCTUM</button>
            <button onclick="showCharacterSelection()">CHARACTER SELECTION</button>
            <p style="font-size: 14px; margin-top: 30px;">
                Use WASD or Arrow Keys to move<br>
                Survive as long as possible!
            </p>
        </div>
        
        <canvas id="gameCanvas" width="1000" height="700" class="hidden"></canvas>
        
        <div id="gameUI" class="hidden">
            <div class="ui-element">
                <div>Level: <span id="levelDisplay">1</span></div>
            </div>
            
            <div id="healthBar">
                <div id="healthFill" style="width: 100%;"></div>
                <div class="bar-text" id="healthText">100/100</div>
            </div>
            
            <div id="xpBar">
                <div id="xpFill" style="width: 0%;"></div>
                <div class="bar-text" id="xpText">0/100</div>
            </div>
            
            <div class="ui-element">
                <div>Time: <span id="timeDisplay">0:00</span></div>
            </div>
            
            <div class="ui-element">
                <div>Kills: <span id="killDisplay">0</span></div>
            </div>
        </div>
        
        <div id="upgradeMenu" class="hidden">
            <h2>Level Up!</h2>
            <p>Choose your upgrade:</p>
            <div id="upgradeOptions"></div>
        </div>
    </div>

    <script src="js/GameEngine.js"></script>
    <script src="js/entities/Player.js"></script>
    <script src="js/entities/Enemy.js"></script>
    <script src="js/entities/Projectile.js"></script>
    <script src="js/entities/Pickup.js"></script>
    <script src="js/systems/CollisionSystem.js"></script>
    <script src="js/systems/RenderSystem.js"></script>
    <script src="js/systems/SpawnSystem.js"></script>
    <script src="js/systems/WeaponSystem.js"></script>
    <script src="js/systems/UpgradeSystem.js"></script>
    <script src="js/systems/MetaProgressionSystem.js"></script>
    <script src="js/systems/StageSystem.js"></script>
    <script src="js/UI/HUD.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
